<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprender.IO</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;700&family=Russo+One&display=swap"> <!--importa as fontes-->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script> <!--importa a biblioteca p5.js antes do código-->
</head>
<body>
    
    <div id="container-fundo"></div>

    <main class="container-principal">
        
        <header class="logo-section">
            
            <h1 class="titulo">APRENDER.IO</h1>
            <p class="subtitulo">ESCOLHA SEU PRÓXIMO APRENDIZADO</p>
        </header>

        <section class="grid-cards">
            
            <!-- LOGICA.IO -->
            <div class="card" id="card-logic">
                <div class="card-imagem logic-bg"></div>
                <div class="card-conteudo">
                    <div class="icone">💻</div>
                    <div class="card-texto">
                        <h3>LOGICA.IO</h3>
                        <p>Algorítmos e Lógica de Programação</p>
                    </div>
                </div>
            </div>

            <!-- GRANDEZAS VETORIAIS -->
            <div class="card" id="card-gv">
                <div class="card-imagem gv-bg"></div>
                <div class="card-conteudo">
                    <div class="icone">↔️</div>
                    <div class="card-texto">
                        <h3>GRANDEZAS VETORIAIS</h3>
                        <p>Vetores e direções</p>
                    </div>
                </div>
            </div>

            <div class="card-placeholder">
                NOVOS MÓDULOS EM BREVE...
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
