<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprender.IO</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;700&family=Russo+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="aprenderio/css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <main class="main-container">
        <header class="logo-section">
            <h1 class="title-gradient">APRENDER.IO</h1>
            <p class="subtitle">ESCOLHA SEU PRÓXIMO APRENDIZADO</p>
        </header>

        <section class="grid-cards">
            <div class="card" id="card-logic">
                <div class="card-image logic-bg"></div>
                <div class="card-content">
                    <div class="icon-box">💻</div>
                    <div class="card-text">
                        <h3>LOGICA.IO</h3>
                        <p>Lógica de Programação e Algorítmos</p>
                    </div>
                </div>
            </div>

            <div class="card" id="card-design">
                <div class="card-image design-bg"></div>
                <div class="card-content">
                    <div class="icon-box">↔️</div>
                    <div class="card-text">
                        <h3>GRANDEZAS VETORIAIS</h3>
                        <p></p>
                    </div>
                </div>
            </div>

            <div class="card-placeholder">
                NOVOS MÓDULOS EM BREVE...
            </div>
        </section>
    </main>

    <script src="aprenderio/js/main.js"></script>
    <script src="aprenderio/sketch.js"></script>
</body>
</html>
